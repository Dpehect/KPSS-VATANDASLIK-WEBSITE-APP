<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Ultra-vibrant teal/indigo gradient background -->
    <linearGradient id="vibrantBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Turquoise -->
      <stop offset="50%" stop-color="#10b981" /> <!-- Emerald -->
      <stop offset="100%" stop-color="#6366f1" /> <!-- Indigo -->
    </linearGradient>

    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.24)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.03)" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.45" />
    </filter>

    <filter id="intenseGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#vibrantBg)" />

  <!-- Floating spheres -->
  <circle cx="100" cy="150" r="180" fill="#34d399" opacity="0.4" filter="url(#intenseGlow)" />
  <circle cx="700" cy="650" r="220" fill="#818cf8" opacity="0.4" filter="url(#intenseGlow)" />
  <circle cx="750" cy="120" r="90" fill="#22d3ee" opacity="0.3" filter="url(#intenseGlow)" />
  <circle cx="50" cy="700" r="130" fill="#c084fc" opacity="0.3" filter="url(#intenseGlow)" />

  <!-- Top Banner Info -->
  <rect x="50" y="35" width="700" height="42" rx="21" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5" />
  <circle cx="75" cy="56" r="6" fill="#ff5f56" />
  <circle cx="95" cy="56" r="6" fill="#ffbd2e" />
  <circle cx="115" cy="56" r="6" fill="#27c93f" />
  <text x="400" y="62" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="2">
    CUSTOM STYLING · FRONTEND WORKBENCH
  </text>

  <!-- Heading -->
  <g filter="url(#shadow)">
    <text x="400" y="145" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="4">
      TAILWIND CSS V4 TUNING
    </text>
    <text x="400" y="195" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="3">
      DATASET THEME CONTRAST GUARD
    </text>
  </g>

  <!-- Code Editor Panel (Glassmorphic VS Code) -->
  <g transform="translate(100, 240)">
    <!-- Glass Panel -->
    <rect x="0" y="0" width="600" height="280" rx="24" fill="rgba(2, 6, 23, 0.72)" stroke="rgba(255, 255, 255, 0.35)" stroke-width="2" filter="url(#shadow)" />
    
    <!-- Code Editor Header -->
    <rect x="0" y="0" width="600" height="38" rx="0" fill="rgba(15, 23, 42, 0.85)" stroke="none" />
    <path d="M 0,38 L 600,38" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
    <circle cx="20" cy="19" r="5" fill="#ef4444" />
    <circle cx="36" cy="19" r="5" fill="#eab308" />
    <circle cx="52" cy="19" r="5" fill="#22c55e" />
    <text x="300" y="24" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="700" fill="#94a3b8">src/app/globals.css</text>

    <!-- Code Content -->
    <g transform="translate(30, 70)" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" xml:space="preserve">
      <!-- Line 1 -->
      <text x="0" y="20"><tspan fill="#34d399">@import</tspan> <tspan fill="#e2e8f0">"tailwindcss";</tspan></text>
      
      <!-- Line 2 -->
      <text x="0" y="55"><tspan fill="#94a3b8">/* Custom dark mode dataset selector mapping */</tspan></text>
      
      <!-- Line 3 -->
      <text x="0" y="90"><tspan fill="#f43f5e">@custom-variant</tspan> <tspan fill="#38bdf8">dark</tspan> <tspan fill="#fbbf24">(&amp;:where([data-theme=dark], [data-theme=dark] *));</tspan></text>
      
      <!-- Line 4 -->
      <text x="0" y="140"><tspan fill="#34d399">.card-surface</tspan> <tspan fill="#e2e8f0">{</tspan></text>
      
      <!-- Line 5 -->
      <text x="20" y="175"><tspan fill="#fbbf24">background:</tspan> <tspan fill="#e2e8f0">var(--sb-surface);</tspan></text>
      
      <!-- Line 6 -->
      <text x="20" y="210"><tspan fill="#fbbf24">color:</tspan> <tspan fill="#e2e8f0">var(--sb-text);</tspan></text>
      
      <!-- Line 7 -->
      <text x="0" y="245"><tspan fill="#e2e8f0">}</tspan></text>
    </g>
  </g>

  <!-- Tech Stack Pills -->
  <g transform="translate(100, 560)">
    <!-- Next.js -->
    <rect x="0" y="0" width="105" height="38" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="52" y="24" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="900" fill="#ffffff">Next.js 15</text>

    <!-- React -->
    <rect x="120" y="0" width="105" height="38" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="172" y="24" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="900" fill="#60a5fa">React 19</text>

    <!-- Supabase -->
    <rect x="240" y="0" width="115" height="38" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="297" y="24" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="900" fill="#34d399">Supabase</text>

    <!-- Tailwind -->
    <rect x="370" y="0" width="110" height="38" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="425" y="24" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="900" fill="#38bdf8">Tailwind v4</text>

    <!-- TS -->
    <rect x="495" y="0" width="105" height="38" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="547" y="24" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="900" fill="#3178c6">TypeScript</text>
  </g>

  <!-- URL Links Box (Glassmorphism + Strong Readability) -->
  <g transform="translate(60, 630)">
    <rect x="0" y="0" width="680" height="120" rx="20" fill="rgba(0, 0, 0, 0.45)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" filter="url(#shadow)" />
    
    <text x="40" y="48" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="900" fill="#94a3b8" letter-spacing="1">LIVE DEMO:</text>
    <text x="180" y="48" font-family="'Inter', system-ui, sans-serif" font-size="19" font-weight="900" fill="#2dd4bf">kpss-vatandaslik-web-app.vercel.app</text>
    
    <text x="40" y="90" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="900" fill="#94a3b8" letter-spacing="1">CODE REPO:</text>
    <text x="180" y="90" font-family="'Inter', system-ui, sans-serif" font-size="19" font-weight="900" fill="#ffffff">github.com/Dpehect/KPSS-Vatandaslik-Web-App</text>
  </g>
</svg>
