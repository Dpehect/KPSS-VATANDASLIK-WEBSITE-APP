<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.07)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bgGrad)" />

  <g opacity="0.05">
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400 M 0,500 L 800,500 M 0,600 L 800,600 M 0,700 L 800,700" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,800 M 200,0 L 200,800 M 300,0 L 300,800 M 400,0 L 400,800 M 500,0 L 500,800 M 600,0 L 600,800 M 700,0 L 700,800" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="330" r="120" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.3" filter="url(#glow)" />
  <circle cx="400" cy="330" r="100" fill="#1e1b4b" opacity="0.4" />

  <g transform="translate(340, 260) scale(1.5)" filter="url(#glow)">
    <path d="M 15,80 L 65,80 M 40,80 L 40,20 M 40,25 Q 40,20 45,20 L 50,20 M 30,20 L 50,20" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 10,35 L 70,35" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none" />
    <circle cx="40" cy="35" r="5" fill="#fbbf24" />
    <path d="M 10,35 L 5,55 L 20,55 Z" stroke="#fbbf24" stroke-width="2" fill="none" />
    <path d="M 2,55 Q 12,65 23,55" stroke="url(#goldGrad)" stroke-width="3" fill="none" />
    <path d="M 70,35 L 65,55 L 80,55 Z" stroke="#fbbf24" stroke-width="2" fill="none" />
    <path d="M 62,55 Q 72,65 83,55" stroke="url(#goldGrad)" stroke-width="3" fill="none" />
  </g>

  <text x="400" y="550" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">
    KPSS VATANDAŞLIK
  </text>
  
  <text x="400" y="605" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="url(#goldGrad)" letter-spacing="1">
    YAYINDA!
  </text>

  <rect x="100" y="660" width="600" height="80" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="400" y="708" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600" fill="#94a3b8">
    9000+ Özgün Soru · Aktif Tekrar · Detaylı Anayasa Özetleri
  </text>
</svg>
