<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.07)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bgGrad)" />

  <g opacity="0.05">
    <circle cx="400" cy="400" r="100" stroke="#ffffff" stroke-width="1" fill="none" />
    <circle cx="400" cy="400" r="200" stroke="#ffffff" stroke-width="1" fill="none" />
    <circle cx="400" cy="400" r="300" stroke="#ffffff" stroke-width="1" fill="none" />
    <path d="M 0,400 L 800,400 M 400,0 L 400,800" stroke="#ffffff" stroke-width="1" />
  </g>

  <circle cx="400" cy="330" r="120" fill="none" stroke="url(#amberGrad)" stroke-width="3" opacity="0.3" filter="url(#glow)" />
  <circle cx="400" cy="330" r="100" fill="#1c1917" opacity="0.4" />

  <!-- Document / Constitution Law Book Icon in SVG -->
  <g transform="translate(340, 260) scale(1.5)" filter="url(#glow)">
    <rect x="15" y="10" width="50" height="70" rx="4" fill="none" stroke="url(#amberGrad)" stroke-width="4" />
    <path d="M 23,10 L 23,80" stroke="url(#amberGrad)" stroke-width="3" />
    <path d="M 32,25 L 55,25 M 32,38 L 55,38 M 32,51 L 48,51" stroke="#fda4af" stroke-width="3" stroke-linecap="round" />
    <circle cx="15" cy="20" r="3" fill="#f43f5e" />
    <circle cx="15" cy="40" r="3" fill="#f43f5e" />
    <circle cx="15" cy="60" r="3" fill="#f43f5e" />
  </g>

  <text x="400" y="550" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">
    1500+ ÖZGÜN TEST
  </text>
  
  <text x="400" y="605" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="800" fill="url(#amberGrad)" letter-spacing="1">
    KOLAY · ORTA · ZOR SEVİYELERİ
  </text>

  <rect x="100" y="660" width="600" height="80" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="400" y="708" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600" fill="#94a3b8">
    Öğrenme Hızınıza Göre Kişiselleştirilmiş Hukuk Testleri
  </text>
</svg>
