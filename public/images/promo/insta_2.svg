<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="40%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Futuristic Grid -->
  <g opacity="0.08">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550 M 0,600 L 800,600 M 0,650 L 800,650 M 0,700 L 800,700 M 0,750 L 800,750" stroke="#ffffff" stroke-width="1" />
    <path d="M 50,0 L 50,800 M 100,0 L 100,800 M 150,0 L 150,800 M 200,0 L 200,800 M 250,0 L 250,800 M 300,0 L 300,800 M 350,0 L 350,800 M 400,0 L 400,800 M 450,0 L 450,800 M 500,0 L 500,800 M 550,0 L 550,800 M 600,0 L 600,800 M 650,0 L 650,800 M 700,0 L 700,800 M 750,0 L 750,800" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Tech Header -->
  <rect x="50" y="40" width="700" height="44" rx="12" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  <circle cx="75" cy="62" r="6" fill="#ef4444" />
  <circle cx="95" cy="62" r="6" fill="#eab308" />
  <circle cx="115" cy="62" r="6" fill="#22c55e" />
  <text x="400" y="68" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="1">
    DATABASE ARCHITECTURE · SEEDING PIPELINE
  </text>

  <!-- Title Section -->
  <text x="400" y="150" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="46" font-weight="900" fill="#ffffff" letter-spacing="3">
    1500+ ÖZGÜN HUKUK TESTİ
  </text>
  <text x="400" y="200" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="url(#roseGrad)" letter-spacing="2">
    SUPABASE JSON BUNDLING ENGINE
  </text>

  <!-- Graphic and Stats Panel -->
  <g transform="translate(100, 240)">
    <!-- Glass Panel -->
    <rect x="0" y="0" width="600" height="280" rx="24" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1" />
    
    <!-- Legal Document Icon in SVG -->
    <g transform="translate(50, 40) scale(1.4)" filter="url(#glow)">
      <rect x="15" y="10" width="50" height="70" rx="4" fill="none" stroke="url(#roseGrad)" stroke-width="4" />
      <path d="M 23,10 L 23,80" stroke="url(#roseGrad)" stroke-width="3" />
      <path d="M 32,25 L 55,25 M 32,38 L 55,38 M 32,51 L 48,51" stroke="#fda4af" stroke-width="3" stroke-linecap="round" />
      <circle cx="15" cy="20" r="3" fill="#f43f5e" />
      <circle cx="15" cy="40" r="3" fill="#f43f5e" />
      <circle cx="15" cy="60" r="3" fill="#f43f5e" />
    </g>

    <!-- Specs List -->
    <g transform="translate(220, 50)" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700">
      <text x="0" y="30" fill="#ffffff">DATABASE ENGINE:</text>
      <text x="210" y="30" fill="#f43f5e">SUPABASE DB (SSR)</text>
      
      <text x="0" y="80" fill="#ffffff">SEED OPTIMIZATION:</text>
      <text x="210" y="80" fill="#f43f5e">BATCH SIZE = 5 (STABLE)</text>
      
      <text x="0" y="130" fill="#ffffff">LATENCY TARGET:</text>
      <text x="210" y="130" fill="#f43f5e">ZERO RUNTIME TIMEOUTS</text>

      <text x="0" y="180" fill="#ffffff">PRELOAD DATA STRUCTURE:</text>
      <text x="210" y="180" fill="#3b82f6">JSON CONTENT BUNDLES</text>
    </g>
  </g>

  <!-- Tech Stack Pills -->
  <g transform="translate(100, 560)">
    <text x="0" y="-15" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="800" fill="#94a3b8" letter-spacing="1">TECHNOLOGY STACK</text>
    
    <!-- Next.js -->
    <rect x="0" y="0" width="105" height="36" rx="8" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text x="52" y="23" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff">Next.js 15</text>

    <!-- React -->
    <rect x="120" y="0" width="105" height="36" rx="8" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text x="172" y="23" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#60a5fa">React 19</text>

    <!-- Supabase -->
    <rect x="240" y="0" width="115" height="36" rx="8" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text x="297" y="23" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#34d399">Supabase DB</text>

    <!-- Tailwind -->
    <rect x="370" y="0" width="110" height="36" rx="8" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text x="425" y="23" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#38bdf8">Tailwind v4</text>

    <!-- TS -->
    <rect x="495" y="0" width="105" height="36" rx="8" fill="#0f172a" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text x="547" y="23" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="800" fill="#3178c6">TypeScript</text>
  </g>

  <!-- Links Block -->
  <g transform="translate(100, 640)">
    <rect x="0" y="0" width="600" height="110" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <text x="30" y="42" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#94a3b8">LIVE DEMO:</text>
    <text x="180" y="42" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="800" fill="#f43f5e">kpss-vatandaslik-web-app.vercel.app</text>
    
    <text x="30" y="82" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#94a3b8">CODE REPO:</text>
    <text x="180" y="82" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff">github.com/Dpehect/KPSS-Vatandaslik-Web-App</text>
  </g>
</svg>
