<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#083344" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.07)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bgGrad)" />

  <g opacity="0.05">
    <path d="M 0,0 L 800,800 M 800,0 L 0,800" stroke="#ffffff" stroke-width="1" />
    <path d="M 0,200 Q 400,0 800,200 M 0,600 Q 400,800 800,600" stroke="#ffffff" stroke-width="1" fill="none" />
  </g>

  <circle cx="400" cy="330" r="120" fill="none" stroke="url(#tealGrad)" stroke-width="3" opacity="0.3" filter="url(#glow)" />
  <circle cx="400" cy="330" r="100" fill="#064e3b" opacity="0.4" />

  <!-- Flashcards stack vector representation in SVG -->
  <g transform="translate(340, 260) scale(1.5)" filter="url(#glow)">
    <!-- Back Card -->
    <rect x="25" y="10" width="55" height="40" rx="6" fill="none" stroke="#047857" stroke-width="3" transform="rotate(-10 52 30)" />
    <!-- Middle Card -->
    <rect x="20" y="18" width="55" height="40" rx="6" fill="none" stroke="#10b981" stroke-width="3" transform="rotate(5 47 38)" />
    <!-- Front Card -->
    <rect x="15" y="25" width="55" height="40" rx="6" fill="#020617" stroke="url(#tealGrad)" stroke-width="4" />
    <!-- Lines inside front card -->
    <path d="M 23,38 L 62,38 M 23,48 L 50,48" stroke="#a7f3d0" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="23" cy="31" r="2" fill="#2dd4bf" />
  </g>

  <text x="400" y="550" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">
    AKTİF TEKRAR KARTLARI
  </text>
  
  <text x="400" y="605" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="800" fill="url(#tealGrad)" letter-spacing="1">
    ANAYASA VE HUKUKU HAFİZANA SABİTLE!
  </text>

  <rect x="100" y="660" width="600" height="80" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="400" y="708" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600" fill="#94a3b8">
    Yasama, Yürütme, Yargı ve İdare Hukuku Hızlı Tekrarı
  </text>
</svg>
